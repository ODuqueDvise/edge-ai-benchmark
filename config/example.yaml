# Configuracion de una corrida. Refleja las CONSTANTES CONGELADAS del protocolo
# (junio 2026). No cambiar sin consenso: si cambian, las mediciones dejan de ser comparables.
run:
  device_tag: jetson-gpu        # jetson-gpu | jetson-cpu | rpi-cpu
  power_mode: MAXN              # Jetson: nvpmodel -m 0 + jetson_clocks ; RPi: governor performance
backend:
  kind: ort                     # ort | tflite
  provider: tensorrt            # ort: tensorrt | cuda | cpu
model:
  path: models/cnn_baseline.onnx
  input_shape: [1, 3, 224, 224]
loop:
  warmup: 100                   # K congelado
  iters: 2000                   # M congelado
  runs: 5                       # R congelado (ejecuciones independientes, idealmente con reinicio)
# Precision: usar el set COMPLETO (10000), sin --limit, para cifras oficiales.
